<div class="show-etagere-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Gestion des Étagères</mat-card-title>
            <mat-card-subtitle>Liste des étagères d'archivage</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <div [formGroup]="filterForm" class="toolbar">
                <mat-form-field appearance="outline" class="search-field">
                    <mat-label>Rechercher</mat-label>
                    <input matInput formControlName="search" placeholder="Numéro, code-barres...">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="filter-field">
                    <mat-label>Armoire</mat-label>
                    <mat-select formControlName="armoire">
                        <mat-option value="">Toutes</mat-option>
                        <mat-option *ngFor="let a of armoires" [value]="a.id">{{ a.code }}</mat-option>
                    </mat-select>
                </mat-form-field>

                <button mat-raised-button color="primary" (click)="openAddDialog()">
                    <mat-icon>add</mat-icon>
                    Nouvelle étagère
                </button>
            </div>

            <div class="table-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <ng-container matColumnDef="numero">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> N° </th>
                        <td mat-cell *matCellDef="let e"> {{e.numero}} </td>
                    </ng-container>

                    <ng-container matColumnDef="armoire">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Armoire </th>
                        <td mat-cell *matCellDef="let e"> {{getArmoireCode(e)}} </td>
                    </ng-container>

                    <ng-container matColumnDef="code_barres">
                        <th mat-header-cell *matHeaderCellDef> Code-barres </th>
                        <td mat-cell *matCellDef="let e"> {{e.code_barres}} </td>
                    </ng-container>

                    <ng-container matColumnDef="capacite">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Capacité </th>
                        <td mat-cell *matCellDef="let e"> {{e.capacite_max_boites}} </td>
                    </ng-container>

                    <ng-container matColumnDef="occupation">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Occupée </th>
                        <td mat-cell *matCellDef="let e"> {{e.occupation_actuelle}} </td>
                    </ng-container>

                    <ng-container matColumnDef="taux">
                        <th mat-header-cell *matHeaderCellDef> Taux </th>
                        <td mat-cell *matCellDef="let e">
                            <div class="taux-container">
                                <mat-progress-bar mode="determinate" [value]="getTauxOccupation(e)"></mat-progress-bar>
                                <span class="taux-value">{{getTauxOccupation(e) | number:'1.0-0'}}%</span>
                            </div>
                        </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let e">
                            <button mat-icon-button color="primary" (click)="openEditDialog(e)" matTooltip="Modifier">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteEtagere(e)" matTooltip="Supprimer">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>

                <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
            </div>
        </mat-card-content>
    </mat-card>
</div>
