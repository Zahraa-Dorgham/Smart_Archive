<h2 mat-dialog-title>{{ isEditMode ? 'Modifier' : 'Ajouter' }} une étagère</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
        <div class="form-grid">
            <mat-form-field appearance="outline">
                <mat-label>Armoire *</mat-label>
                <mat-select formControlName="armoire">
                    <mat-option *ngFor="let a of armoires" [value]="a.id">{{ a.code }}</mat-option>
                </mat-select>
                <mat-error *ngIf="form.get('armoire')?.hasError('required')">Requis</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Numéro *</mat-label>
                <input matInput type="number" formControlName="numero">
                <mat-error *ngIf="form.get('numero')?.hasError('required')">Requis</mat-error>
                <mat-error *ngIf="form.get('numero')?.hasError('min')">Doit être ≥ 1</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Code-barres</mat-label>
                <input matInput formControlName="code_barres">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Capacité max (boîtes) *</mat-label>
                <input matInput type="number" formControlName="capacite_max_boites">
                <mat-error *ngIf="form.get('capacite_max_boites')?.hasError('required')">Requis</mat-error>
                <mat-error *ngIf="form.get('capacite_max_boites')?.hasError('min')">Doit être ≥ 1</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Occupation actuelle</mat-label>
                <input matInput type="number" formControlName="occupation_actuelle">
                <mat-error *ngIf="form.get('occupation_actuelle')?.hasError('min')">Doit être ≥ 0</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="description" rows="3"></textarea>
            </mat-form-field>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button type="button" mat-dialog-close>Annuler</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            {{ isEditMode ? 'Modifier' : 'Créer' }}
        </button>
    </mat-dialog-actions>
</form>
