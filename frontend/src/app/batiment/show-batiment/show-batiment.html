<!-- batiment/show-batiment/show-batiment.html -->
<div class="show-batiment-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Gestion des Bâtiments</mat-card-title>
            <mat-card-subtitle>Liste des bâtiments d'archivage</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <div [formGroup]="filterForm" class="toolbar">
                
                <mat-form-field appearance="outline" class="search-field">
                    <mat-label>Rechercher</mat-label>
                    <input matInput formControlName="search" placeholder="Nom, ville, adresse...">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
                

                <button mat-raised-button color="primary" (click)="openAddDialog()">
                    <mat-icon>add</mat-icon>
                    Nouveau bâtiment
                </button>
            </div>

            <div class="table-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <ng-container matColumnDef="nom">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nom </th>
                        <td mat-cell *matCellDef="let b"> {{b.nom}} </td>
                    </ng-container>

                    <ng-container matColumnDef="adresse">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Adresse </th>
                        <td mat-cell *matCellDef="let b"> {{b.adresse}} </td>
                    </ng-container>

                    <ng-container matColumnDef="ville">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Ville </th>
                        <td mat-cell *matCellDef="let b"> {{b.ville}} </td>
                    </ng-container>

                    <ng-container matColumnDef="nombre_salles">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Salles </th>
                        <td mat-cell *matCellDef="let b"> {{b.nombre_salles || 0}} </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let b">
                            <button mat-icon-button color="primary" (click)="openEditDialog(b)" matTooltip="Modifier">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteBatiment(b)" matTooltip="Supprimer">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>

                <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
            </div>
        </mat-card-content>
    </mat-card>
</div>
