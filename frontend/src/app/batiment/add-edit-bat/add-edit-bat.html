<h2 mat-dialog-title>{{ isEditMode ? 'Modifier' : 'Ajouter' }} un bâtiment</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
        <div class="form-grid">
            <mat-form-field appearance="outline">
                <mat-label>Nom *</mat-label>
                <input matInput formControlName="nom">
                <mat-error *ngIf="form.get('nom')?.hasError('required')">Requis</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Code *</mat-label>
                <input matInput formControlName="code" placeholder="ex: B001">
                <mat-error *ngIf="form.get('code')?.hasError('required')">Requis</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Adresse *</mat-label>
                <input matInput formControlName="adresse">
                <mat-error *ngIf="form.get('adresse')?.hasError('required')">Requis</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Ville</mat-label>
                <input matInput formControlName="ville">
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="description" rows="3"></textarea>
            </mat-form-field>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button type="button" mat-dialog-close>Annuler</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            {{ isEditMode ? 'Modifier' : 'Créer' }}
        </button>
    </mat-dialog-actions>
</form>
