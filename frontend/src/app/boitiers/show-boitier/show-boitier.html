<div class="show-boitier-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Gestion des Boîtiers</mat-card-title>
            <mat-card-subtitle>Liste des boîtiers d'archivage</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <div [formGroup]="filterForm" class="toolbar">
                <mat-form-field appearance="outline" class="search-field">
                    <mat-label>Rechercher</mat-label>
                    <input matInput formControlName="search" placeholder="ID, titre, code-barres...">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
                <mat-form-field appearance="outline" class="filter-field">
                    <mat-label>Statut</mat-label>
                    <mat-select formControlName="statut">
                        <mat-option value="">Tous</mat-option>
                        <mat-option value="ACTIF">Actif</mat-option>
                        <mat-option value="PLEIN">Plein</mat-option>
                        <mat-option value="ARCHIVE">Archivé</mat-option>
                        <mat-option value="EN_TRANSFERT">En transfert</mat-option>
                    </mat-select>
                </mat-form-field>
                <button mat-raised-button color="primary" (click)="openAddDialog()">
                    <mat-icon>add</mat-icon> Nouveau boîtier
                </button>
            </div>

            <div class="table-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <!-- Définitions des colonnes -->
                    <ng-container matColumnDef="idboit">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                        <td mat-cell *matCellDef="let b"> {{b.idboit}} </td>
                    </ng-container>
                    <ng-container matColumnDef="titre">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Titre </th>
                        <td mat-cell *matCellDef="let b"> {{b.titre}} </td>
                    </ng-container>
                    <ng-container matColumnDef="code_barre">
                        <th mat-header-cell *matHeaderCellDef> Code-barres </th>
                        <td mat-cell *matCellDef="let b"> {{b.code_barre}} </td>
                    </ng-container>
                    <ng-container matColumnDef="localisation">
                        <th mat-header-cell *matHeaderCellDef> Localisation </th>
                        <td mat-cell *matCellDef="let b"> {{getLocalisation(b)}} </td>
                    </ng-container>
                    <ng-container matColumnDef="capacite">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Capacité </th>
                        <td mat-cell *matCellDef="let b"> {{b.capacite}} </td>
                    </ng-container>
                    <ng-container matColumnDef="statut">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Statut </th>
                        <td mat-cell *matCellDef="let b">
                            <mat-chip [color]="getStatutColor(b.statut)" selected>{{b.statut}}</mat-chip>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let b">
                            <button mat-icon-button color="primary" (click)="openEditDialog(b)" matTooltip="Modifier">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteBoitier(b)" matTooltip="Supprimer">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <!-- Lignes d'en-tête et de données -->
                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
                <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>
            </div>
        </mat-card-content>
    </mat-card>
</div>
