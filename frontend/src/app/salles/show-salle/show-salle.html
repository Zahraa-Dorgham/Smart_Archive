<div class="show-salle-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>Gestion des Salles</mat-card-title>
            <mat-card-subtitle>Liste des salles d'archivage</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <div [formGroup]="filterForm" class="filters-grid">
                <mat-form-field appearance="outline">
                    <mat-label>Rechercher</mat-label>
                    <input matInput formControlName="search" placeholder="Nom, code...">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Bâtiment</mat-label>
                    <mat-select formControlName="batiment">
                        <mat-option value="">Tous</mat-option>
                        <mat-option *ngFor="let b of batiments" [value]="b.id">{{ b.nom }}</mat-option>
                    </mat-select>
                </mat-form-field>

                <button mat-raised-button color="primary" (click)="openAddDialog()">
                    <mat-icon>add</mat-icon> Nouvelle salle
                </button>
            </div>

            <div class="table-container">
                <table mat-table [dataSource]="dataSource" matSort>
                    <ng-container matColumnDef="code">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Code </th>
                        <td mat-cell *matCellDef="let s"> {{s.code}} </td>
                    </ng-container>

                    <ng-container matColumnDef="nom">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nom </th>
                        <td mat-cell *matCellDef="let s"> {{s.nom}} </td>
                    </ng-container>

                    <ng-container matColumnDef="batiment_nom">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Bâtiment </th>
                        <td mat-cell *matCellDef="let s"> {{s.batiment_nom}} </td>
                    </ng-container>

                    <ng-container matColumnDef="type_salle">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Type </th>
                        <td mat-cell *matCellDef="let s"> {{s.type_salle}} </td>
                    </ng-container>

                    <ng-container matColumnDef="etage">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Étage </th>
                        <td mat-cell *matCellDef="let s"> {{s.etage}} </td>
                    </ng-container>

                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef> Actions </th>
                        <td mat-cell *matCellDef="let s">
                            <button mat-icon-button color="primary" (click)="openEditDialog(s)" matTooltip="Modifier">
                                <mat-icon>edit</mat-icon>
                            </button>
                            <button mat-icon-button color="warn" (click)="deleteSalle(s)" matTooltip="Supprimer">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>

                <mat-paginator [pageSizeOptions]="[5,10,20]" showFirstLastButtons></mat-paginator>
            </div>
        </mat-card-content>
    </mat-card>
</div>
