<h2 mat-dialog-title>{{ isEditMode ? 'Modifier' : 'Ajouter' }} une salle</h2>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
    <mat-dialog-content>
        <div class="form-grid">
            <mat-form-field appearance="outline">
                <mat-label>Nom *</mat-label>
                <input matInput formControlName="nom">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Code *</mat-label>
                <input matInput formControlName="code">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Bâtiment *</mat-label>
                <mat-select formControlName="batiment">
                    <mat-option *ngFor="let b of data.batiments" [value]="b.id">{{ b.nom }}</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Type *</mat-label>
                <mat-select formControlName="type_salle">
                    <mat-option value="ARCHIVE">Salle d'archive</mat-option>
                    <mat-option value="CONSULTATION">Salle de consultation</mat-option>
                    <mat-option value="TRI">Salle de tri</mat-option>
                    <mat-option value="NUMERISATION">Salle de numérisation</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Étage *</mat-label>
                <input matInput type="number" formControlName="etage">
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Description</mat-label>
                <textarea matInput formControlName="description" rows="3"></textarea>
            </mat-form-field>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button mat-dialog-close>Annuler</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
            {{ isEditMode ? 'Modifier' : 'Créer' }}
        </button>
    </mat-dialog-actions>
</form>
