<!-- user-form.component.html -->
<h2>{{ isEditMode ? 'Modifier' : 'Créer' }} un utilisateur</h2>

<form (ngSubmit)="save()">
    <div>
        <label>Nom d'utilisateur :</label>
        <input type="text" [(ngModel)]="user.username" name="username" required />
    </div>

    <div>
        <label>Email :</label>
        <input type="email" [(ngModel)]="user.email" name="email" />
    </div>

    <div *ngIf="!isEditMode">
        <label>Mot de passe :</label>
        <input type="password" [(ngModel)]="user.password" name="password" required />
    </div>

    <div>
        <label>Groupes (rôles) :</label>
        <select multiple [(ngModel)]="selectedGroupIds" name="groups">
            <option *ngFor="let group of allGroups" [value]="group.id">
                {{ group.name }}
            </option>
        </select>
        <small>Maintenez Ctrl (ou Cmd) pour sélectionner plusieurs groupes</small>
    </div>

    <div class="actions">
        <button type="submit" class="btn-save"> Enregistrer</button>
        <button type="button" class="btn-cancel" (click)="cancel()"> Annuler</button>
    </div>
</form>
